<!DOCTYPE html>
<html>
    <head>
        <title>AnimeOnlime</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        {% load static %}
        <link rel="stylesheet" type="text/css" href="{%static '/css/style.css'%}">
    </head>
    <body style="background-color: black;">
        <nav class="navbar navbar-expand-lg dark-mode" >
            <div class="container-fluid">
                <a class="navbar-brand dark-mode" href="{% url 'home'%}">Home</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link dark-mode" aria-current="page" href="{% url 'createroom'%}">create room</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link dark-mode" href="{% url 'roomjoin'%}">join room</a>
                    </li>
                    <!-- <li class="nav-item">
                        <a class="nav-link dark-mode" href="#">na maybutne</a>
                    </li> -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle dark-mode" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Account
                        </a>
                        <ul class="dropdown-menu dark-mode">
                            {% if user.is_authenticated %}
                                <li><a class="dropdown-item dark-mode" href="{% url 'logout'%}">logout</a></li>
                            {% else %}
                                <li><a class="dropdown-item dark-mode" href="{% url 'register'%}">register</a></li>
                                <li><a class="dropdown-item dark-mode" href="{% url 'login'%}">login</a></li>
                            {% endif %}
                            
                        </ul>
                    </li>
                </ul>
                </div>
            </div>
        </nav>
        <div>
            {% block content %}

            {% endblock %}
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
